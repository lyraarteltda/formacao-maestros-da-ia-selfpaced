    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Generate UUID for sck if doesn't exist
        if (!window.globalSck) {
          window.globalSck = crypto.randomUUID();
        }
        
        // Get UTMs from current URL
        const params = new URLSearchParams(window.location.search);
        const utms = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term']
          .map(param => `${param}=${params.get(param) || ''}`)
          .join('&');
        
        // Update OnProfit links
        document.querySelectorAll('a[href*="pay.onprofit.com.br"]').forEach(link => {
          const [base, query] = link.href.split('?');
          const existing = query ? `&${query}` : '';
          link.href = `${base}?${utms}&sck=${window.globalSck}${existing}`;
          
          link.addEventListener('click', e => {
            e.preventDefault();
            window.location.href = link.href;
          });
        });
        
        // Handle button with id="onprofit"
        const onprofitBtn = document.getElementById('onprofit');
        if(onprofitBtn) {
          onprofitBtn.addEventListener('click', e => {
            e.preventDefault();
            const baseURL = 'https://pay.onprofit.com.br/M5Ene7El?off=MPTa5';
            window.location.href = `${baseURL}&${utms}&sck=${window.globalSck}`;
          });
        }
      });
    </script>
